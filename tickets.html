<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1440">
<title>Tickets · Blidworth Welfare FC</title>
<link rel="stylesheet" href="styles/base.css">
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="components/data.js"></script>
<script src="components/ui.js"></script>
<script type="text/babel">
function Page() {
  const d = BW_DATA;
  return (<>
    <Ticker/>
    <SiteNav current="tickets"/>

    <section style={{ background: 'var(--ink)', color: 'var(--paper)', padding: '120px 0 140px', minHeight: '70vh', display: 'flex', alignItems: 'center' }}>
      <div className="wrap" style={{ width: '100%' }}>
        <div style={{ maxWidth: 720 }}>
          <div className="eyebrow reveal reveal-1" style={{ color: 'var(--gold)', marginBottom: 24 }}>Tickets</div>
          <h1 className="h-display reveal reveal-2" style={{ fontSize: 'clamp(80px, 12vw, 200px)', fontWeight: 700, lineHeight: 0.86, letterSpacing: '-0.03em', marginBottom: 40 }}>
            COMING<br/>SOON.
          </h1>
          <p className="reveal reveal-3" style={{ fontSize: 20, opacity: 0.7, maxWidth: 520, lineHeight: 1.6 }}>
            Online ticketing is on its way for the 2026/27 centenary season. In the meantime, tickets are available on the gate at the Welfare Ground.
          </p>
          <div className="reveal reveal-4" style={{ marginTop: 48, display: 'flex', gap: 16, flexWrap: 'wrap' }}>
            <a href="fixtures.html" className="btn" style={{ background: 'var(--gold)', color: 'var(--ink)', border: 'none' }}>
              View Fixtures →
            </a>
            <a href="home.html" className="btn" style={{ border: '1px solid rgba(255,255,255,0.3)', color: 'var(--paper)' }}>
              Back to Home
            </a>
          </div>
        </div>
      </div>
    </section>

    <SponsorStrip sponsors={d.sponsors}/>
    <SiteFooter/>
  </>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<Page/>);
</script>
</body>
</html>
