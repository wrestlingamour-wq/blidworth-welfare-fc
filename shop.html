<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Club Shop · Blidworth Welfare FC</title>
<link rel="stylesheet" href="styles/base.css">
<link rel="stylesheet" href="styles/mobile.css">
<style>
  .prod-card { transition: transform 0.25s, box-shadow 0.25s; }
  .prod-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.10); }
  .prod-img-wrap { overflow: hidden; }
  .prod-img-wrap img, .prod-img-wrap .ph { transition: transform 0.5s ease; }
  .prod-card:hover .prod-img-wrap img,
  .prod-card:hover .prod-img-wrap .ph { transform: scale(1.04); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="components/data.js"></script>
<script src="components/ui.js"></script>
<script type="text/babel">

function ProductCard({ item }) {
  const badge = item.badge;
  return (
    <div className="prod-card" style={{ background: 'var(--paper)', border: '1px solid var(--rule)', display: 'flex', flexDirection: 'column' }}>
      <div className="prod-img-wrap" style={{ position: 'relative', aspectRatio: '4/3', overflow: 'hidden' }}>
        {item.photo
          ? <img src={item.photo} style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} alt={item.name}/>
          : <div className="ph" style={{ width: '100%', height: '100%', opacity: 0.25 }}/>
        }
        {badge && (
          <span style={{
            position: 'absolute', top: 16, left: 16,
            background: badge === 'LIMITED' ? 'var(--ink)' : 'var(--red)',
            color: badge === 'LIMITED' ? 'var(--gold)' : 'var(--paper)',
            fontSize: 10, fontWeight: 700, letterSpacing: '0.12em',
            padding: '4px 10px', textTransform: 'uppercase',
          }}>{badge}</span>
        )}
        {!item.available && (
          <div style={{
            position: 'absolute', inset: 0, background: 'rgba(10,10,10,0.55)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <span style={{ color: 'var(--paper)', fontSize: 13, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', opacity: 0.9 }}>Sold Out</span>
          </div>
        )}
      </div>
      <div style={{ padding: '20px 20px 24px', flex: 1, display: 'flex', flexDirection: 'column', gap: 8 }}>
        <div className="eyebrow" style={{ fontSize: 10, opacity: 0.45, marginBottom: 2 }}>{item.cat}</div>
        <div style={{ fontWeight: 700, fontSize: 17, lineHeight: 1.25, flex: 1 }}>{item.name}</div>
        {item.desc && <div style={{ fontSize: 13, opacity: 0.6, lineHeight: 1.55 }}>{item.desc}</div>}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: 12 }}>
          <span style={{ fontSize: 22, fontWeight: 700 }}>£{item.price}</span>
          {item.available && item.buyLink
            ? <a href={item.buyLink} target="_blank" rel="noopener" className="btn" style={{ fontSize: 13, padding: '10px 20px' }}>Buy →</a>
            : item.available
              ? <span style={{ fontSize: 12, opacity: 0.45, fontStyle: 'italic' }}>Link coming soon</span>
              : <span style={{ fontSize: 12, color: 'var(--muted)', fontStyle: 'italic' }}>Sold out</span>
          }
        </div>
      </div>
    </div>
  );
}

function Page() {
  const d = BW_DATA;
  const allProducts = (d.shop || []);
  const cats = ['All', ...Array.from(new Set(allProducts.map(p => p.cat)))];
  const [cat, setCat] = React.useState('All');

  const visible = cat === 'All' ? allProducts : allProducts.filter(p => p.cat === cat);
  const featured = allProducts[0] || null;

  return (<>
    <Ticker/>
    <SiteNav current="shop"/>

    {/* Hero */}
    <section style={{ background: 'var(--ink)', color: 'var(--paper)', position: 'relative', overflow: 'hidden', minHeight: 480 }}>
      {featured && featured.photo
        ? <img src={featured.photo} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover', opacity: 0.35 }}/>
        : <div className="ph" style={{ position: 'absolute', inset: 0, opacity: 0.15 }}/>
      }
      <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(120deg, rgba(10,10,10,0.92) 50%, rgba(10,10,10,0.55))' }}/>
      <div className="wrap" style={{ position: 'relative', padding: '100px 0 80px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 48, alignItems: 'center' }}>
        <div>
          <div className="eyebrow" style={{ color: 'var(--gold)', marginBottom: 20 }}>Blidworth Welfare FC · Official Merchandise</div>
          <h1 className="h-editorial" style={{ fontSize: 'clamp(56px, 6vw, 100px)', fontWeight: 400, textWrap: 'balance', marginBottom: 24, lineHeight: 0.95 }}>
            Club<br/>Shop.
          </h1>
          <p style={{ fontSize: 17, opacity: 0.72, maxWidth: 480, lineHeight: 1.65, marginBottom: 36 }}>
            Official kits, training wear, and club accessories — all in one place.
            {featured && ` The ${featured.name} is available now.`}
          </p>
          <a href="#products" className="btn">
            Browse all →
          </a>
        </div>
        {featured && (
          <div style={{ display: 'flex', justifyContent: 'flex-end' }}>
            {featured.badge && (
              <div style={{ textAlign: 'right' }}>
                <span style={{ background: 'var(--red)', color: 'var(--paper)', fontSize: 11, fontWeight: 700, letterSpacing: '0.12em', padding: '6px 16px', textTransform: 'uppercase' }}>
                  {featured.badge}
                </span>
                <div style={{ marginTop: 20, fontSize: 32, fontWeight: 700, fontFamily: 'var(--font-editorial)' }}>{featured.name}</div>
                <div style={{ fontSize: 40, fontWeight: 700, color: 'var(--gold)', marginTop: 8 }}>£{featured.price}</div>
              </div>
            )}
          </div>
        )}
      </div>
    </section>

    {/* Category filter + grid */}
    <section id="products" style={{ padding: '72px 0', background: 'var(--paper-2)' }}>
      <div className="wrap">
        {/* Filter tabs */}
        {cats.length > 2 && (
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 48 }}>
            {cats.map(c => (
              <button key={c} onClick={() => setCat(c)} style={{
                padding: '8px 22px', fontSize: 13, fontWeight: 700, letterSpacing: '0.06em',
                textTransform: 'uppercase', border: '1px solid var(--rule)', cursor: 'pointer',
                background: cat === c ? 'var(--ink)' : 'transparent',
                color: cat === c ? 'var(--paper)' : 'var(--ink)',
                transition: 'all 0.15s',
              }}>{c}</button>
            ))}
          </div>
        )}

        {visible.length === 0 && (
          <div style={{ textAlign: 'center', padding: '80px 0', opacity: 0.4 }}>
            <p style={{ fontSize: 18 }}>No products in this category yet.</p>
          </div>
        )}

        {/* Grid */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(260px, 1fr))', gap: 28 }}>
          {visible.map(item => <ProductCard key={item.id} item={item}/>)}
        </div>
      </div>
    </section>

    <SponsorStrip sponsors={d.sponsors}/>
    <SiteFooter/>
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<Page/>);
</script>
</body>
</html>
