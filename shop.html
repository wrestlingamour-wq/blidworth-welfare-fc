<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1440">
<title>Club Shop · Blidworth Welfare FC</title>
<link rel="stylesheet" href="styles/base.css">
<style>.product:hover .product-img { transform: scale(1.04); } .product-img { transition: transform 0.6s ease; }</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script>
(function(){var s=document.createElement('script');s.src='components/data.js?v='+Date.now();s.async=false;document.head.appendChild(s);})();
</script>
<script src="components/ui.js"></script>
<script type="text/babel">
const products = [
  { name: 'Centenary Home Shirt 25/26', cat: 'Shirts', price: 42, badge: 'NEW', colour: 'gold' },
  { name: 'Away Shirt 25/26 — White', cat: 'Shirts', price: 38, colour: 'light' },
  { name: 'Third Shirt — Forest Green', cat: 'Shirts', price: 38, colour: 'dark' },
  { name: '1926 Heritage Retro Shirt', cat: 'Retro', price: 45, badge: 'LIMITED', colour: 'light' },
  { name: 'Club Training Tee — Black', cat: 'Training', price: 24, colour: 'dark' },
  { name: 'Quarter-Zip Midlayer', cat: 'Training', price: 36, colour: 'dark' },
  { name: 'Match Day Scarf', cat: 'Accessories', price: 18, colour: 'gold' },
  { name: 'Enamel Crest Pin Badge', cat: 'Accessories', price: 5, colour: 'gold' },
  { name: 'Centenary Programme Binder', cat: 'Accessories', price: 12, colour: 'light' },
];

function Page() {
  const d = BW_DATA;
  const [cat, setCat] = React.useState('All');
  const cats = ['All', 'Shirts', 'Training', 'Retro', 'Accessories'];
  const visible = cat === 'All' ? products : products.filter(p => p.cat === cat);
  return (<>
    <Ticker/>
    <SiteNav current="shop"/>

    <section style={{
      background: 'var(--ink)', color: 'var(--paper)',
      padding: 0, position: 'relative', overflow: 'hidden',
    }}>
      <div style={{ display: 'grid', gridTemplateColumns: '1.2fr 1fr', minHeight: 560 }}>
        <div style={{ padding: '96px 80px', display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
          <div className="eyebrow" style={{ color: 'var(--gold)', marginBottom: 20 }}>Pre-order · Dropping 1st May</div>
          <h1 className="h-editorial" style={{ fontSize: 'clamp(64px, 7vw, 120px)', fontWeight: 400, textWrap: 'balance', marginBottom: 24 }}>
            The centenary<br/>home shirt.
          </h1>
          <p style={{ fontSize: 18, opacity: 0.75, maxWidth: 520, marginBottom: 32 }}>
            Heritage black with commemorative gold trim. Embroidered crest. Limited run of 1,926 individually numbered pieces.
          </p>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 16, marginBottom: 32 }}>
            <div className="h-display mono-num" style={{ fontSize: 80, fontWeight: 700 }}>£42</div>
            <div style={{ opacity: 0.6, fontSize: 14 }}>inc. VAT · free UK shipping</div>
          </div>
          <div style={{ display: 'flex', gap: 12 }}>
            <a href="#" className="btn" style={{ background: 'var(--gold)', color: 'var(--ink)', borderColor: 'var(--gold)' }}>Pre-order →</a>
            <a href="#" className="btn ghost-light">Size Guide</a>
          </div>
        </div>
        <div className="ph gold" style={{ minHeight: 560 }}>
          <span className="ph-label">[ hero: centenary shirt on hanger, dramatic lighting ]</span>
        </div>
      </div>
    </section>

    <section style={{ padding: '48px 0 32px', borderBottom: '1px solid var(--rule)' }}>
      <div className="wrap" style={{ display: 'flex', gap: 8, overflowX: 'auto' }}>
        {cats.map(c => (
          <button key={c} onClick={() => setCat(c)} style={{
            padding: '10px 18px', border: '1px solid var(--rule)',
            background: cat === c ? 'var(--ink)' : 'transparent',
            color: cat === c ? 'var(--paper)' : 'var(--ink)',
            fontFamily: 'var(--font-display)', textTransform: 'uppercase',
            letterSpacing: '0.1em', fontSize: 12, fontWeight: 500,
          }}>{c}</button>
        ))}
      </div>
    </section>

    <section style={{ padding: '64px 0 96px' }}>
      <div className="wrap">
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 32 }}>
          {visible.map((p, i) => (
            <a key={i} href="#" className="product" style={{ color: 'var(--ink)' }}>
              <div style={{ overflow: 'hidden', marginBottom: 16, position: 'relative' }}>
                <div className={`ph ${p.colour} product-img`} style={{ height: 380 }}>
                  <span className="ph-label">[ {p.name} ]</span>
                </div>
                {p.badge && (
                  <div className="chip" style={{
                    position: 'absolute', top: 16, left: 16,
                    background: 'var(--red)', color: '#fff', borderColor: 'var(--red)',
                  }}>{p.badge}</div>
                )}
              </div>
              <div className="eyebrow" style={{ opacity: 0.5, marginBottom: 6 }}>{p.cat}</div>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                <div className="h-display" style={{ fontSize: 18, fontWeight: 600 }}>{p.name}</div>
                <div className="h-display mono-num" style={{ fontSize: 20, fontWeight: 600 }}>£{p.price}</div>
              </div>
            </a>
          ))}
        </div>
      </div>
    </section>

    <SponsorStrip sponsors={d.sponsors}/>
    <SiteFooter/>
  </>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<Page/>);
</script>
</body>
</html>
