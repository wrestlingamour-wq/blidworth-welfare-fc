<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Blidworth Welfare FC · Admin</title>
<link rel="stylesheet" href="styles/base.css">
<link rel="stylesheet" href="styles/mobile.css">
<style>
  body { background: var(--paper-2); }
  .admin-shell { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
  .admin-side {
    background: var(--ink); color: var(--paper);
    padding: 28px 0; position: sticky; top: 0; height: 100vh;
  }
  .admin-side-head {
    padding: 0 24px 24px; border-bottom: 1px solid var(--rule-light);
    display: flex; align-items: center; gap: 12px;
  }
  .admin-side-head img { height: 32px; }
  .admin-side-head h1 {
    font-family: var(--font-display); text-transform: uppercase;
    letter-spacing: 0.1em; font-size: 12px; font-weight: 600;
  }
  .admin-side-head span { display: block; font-size: 10px; opacity: 0.6; letter-spacing: 0.12em; }
  .admin-nav { padding: 16px 0; display: flex; flex-direction: column; }
  .admin-nav a {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 24px; color: var(--paper); text-decoration: none;
    font-size: 13px; font-family: var(--font-body);
    border-left: 3px solid transparent; transition: all 0.15s;
  }
  .admin-nav a:hover { background: var(--ink-2); }
  .admin-nav a.active { border-left-color: var(--gold); background: var(--ink-2); color: var(--gold); }
  .admin-nav .dot {
    width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center;
    font-size: 13px; opacity: 0.7;
  }
  .admin-user {
    position: absolute; bottom: 24px; left: 24px; right: 24px;
    padding-top: 20px; border-top: 1px solid var(--rule-light);
    font-size: 11px; display: flex; align-items: center; gap: 10px;
  }
  .admin-user .avatar {
    width: 32px; height: 32px; border-radius: 50%; background: var(--gold);
    color: var(--ink); display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-family: var(--font-display);
  }

  .admin-main { padding: 32px 40px 80px; }
  .admin-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 32px;
  }
  .admin-bar h2 { font-family: var(--font-display); font-size: 28px; font-weight: 700; }
  .admin-bar .eyebrow { opacity: 0.5; margin-bottom: 6px; }

  .admin-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 40px; }
  .stat-card {
    background: var(--white); border: 1px solid var(--rule); padding: 20px;
  }
  .stat-card .k { font-family: var(--font-display); text-transform: uppercase; letter-spacing: 0.1em; font-size: 10px; opacity: 0.55; margin-bottom: 8px; }
  .stat-card .v { font-family: var(--font-display); font-size: 36px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .stat-card .delta { font-size: 11px; opacity: 0.6; margin-top: 6px; }
  .stat-card .delta.up { color: var(--green); opacity: 1; }
  .stat-card .delta.down { color: var(--red); opacity: 1; }

  .admin-panels { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; }
  .panel { background: var(--white); border: 1px solid var(--rule); }
  .panel-head {
    padding: 16px 20px; border-bottom: 1px solid var(--rule);
    display: flex; justify-content: space-between; align-items: center;
  }
  .panel-head h3 { font-family: var(--font-display); font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
  .panel-head .mini-btn { font-size: 11px; padding: 6px 12px; border: 1px solid var(--ink); background: transparent; font-family: var(--font-display); text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; }
  .panel-head .mini-btn.primary { background: var(--ink); color: var(--paper); }
  .panel-head .mini-btn:hover { background: var(--gold); color: var(--ink); border-color: var(--gold); }

  .row {
    display: grid; grid-template-columns: 1fr auto auto; gap: 12px;
    padding: 14px 20px; border-bottom: 1px solid var(--rule);
    align-items: center;
  }
  .row:last-child { border-bottom: none; }
  .row:hover { background: var(--paper-2); }
  .row .title { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
  .row .meta { font-size: 11px; opacity: 0.6; }
  .badge {
    font-family: var(--font-display); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
    padding: 3px 8px; font-weight: 600;
  }
  .badge.pub { background: var(--green); color: white; }
  .badge.draft { background: var(--rule); color: var(--ink); }
  .badge.sched { background: var(--gold); color: var(--ink); }

  .row .actions { display: flex; gap: 4px; }
  .row .icon-btn {
    width: 28px; height: 28px; border: 1px solid var(--rule); background: transparent;
    cursor: pointer; font-size: 12px;
  }
  .row .icon-btn:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .activity { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .activity-item { display: flex; gap: 12px; font-size: 12px; }
  .activity-item .dot-2 { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); margin-top: 6px; flex-shrink: 0; }
  .activity-item strong { font-weight: 600; }
  .activity-item .when { opacity: 0.5; font-size: 10px; margin-top: 2px; }

  .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 16px 20px; }
  .quick-actions button {
    padding: 16px; border: 1px solid var(--rule); background: var(--paper-2);
    font-family: var(--font-display); font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em;
    font-weight: 600; cursor: pointer; text-align: left;
  }
  .quick-actions button:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .quick-actions .ico { display: block; font-size: 18px; margin-bottom: 8px; opacity: 0.7; }
  .quick-actions button:hover .ico { opacity: 1; }

  /* LOGIN OVERLAY */
  .login {
    position: fixed; inset: 0; z-index: 100;
    background: var(--ink); color: var(--paper);
    display: flex; align-items: center; justify-content: center;
    background-image:
      radial-gradient(circle at 80% 20%, rgba(212,162,76,0.12), transparent 50%),
      radial-gradient(circle at 20% 80%, rgba(200,16,46,0.08), transparent 50%);
  }
  .login-card {
    width: 420px; padding: 48px;
    background: var(--ink-2); border: 1px solid var(--rule-light);
  }
  .login-crest { height: 56px; margin-bottom: 32px; }
  .login h1 { font-family: var(--font-display); font-size: 32px; font-weight: 700; margin-bottom: 8px; }
  .login .eyebrow { color: var(--gold); margin-bottom: 24px; }
  .login label { display: block; font-family: var(--font-display); text-transform: uppercase; font-size: 10px; letter-spacing: 0.12em; margin-bottom: 6px; opacity: 0.7; margin-top: 16px; }
  .login input {
    width: 100%; padding: 12px 14px; background: var(--ink);
    border: 1px solid var(--rule-light); color: var(--paper);
    font-size: 14px; font-family: var(--font-body);
  }
  .login input:focus { outline: 2px solid var(--gold); }
  .login .login-btn {
    width: 100%; padding: 14px; margin-top: 24px;
    background: var(--gold); color: var(--ink); border: none;
    font-family: var(--font-display); font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.12em; font-size: 13px; cursor: pointer;
  }
  .login .login-btn:hover { background: var(--paper); }
  .login .meta { margin-top: 20px; font-size: 11px; opacity: 0.5; text-align: center; }
  .login .hint { margin-top: 16px; padding: 10px 14px; background: rgba(212,162,76,0.1); border-left: 2px solid var(--gold); font-size: 11px; opacity: 0.85; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
function Login({ onLogin }) {
  const [user, setUser] = React.useState('welfare.admin');
  const [pass, setPass] = React.useState('••••••••••');
  const [err, setErr] = React.useState(null);
  const submit = (e) => {
    e.preventDefault();
    if (!user || !pass) { setErr('Both fields required'); return; }
    onLogin(user);
  };
  return (
    <div className="login">
      <form className="login-card" onSubmit={submit}>
        <img src="assets/crest.png" className="login-crest" alt=""/>
        <div className="eyebrow">Blidworth Welfare FC</div>
        <h1>Admin Sign-in</h1>
        <label>Username</label>
        <input value={user} onChange={e => setUser(e.target.value)} autoComplete="username"/>
        <label>Password</label>
        <input type="password" value={pass} onChange={e => setPass(e.target.value)} autoComplete="current-password"/>
        <button className="login-btn" type="submit">Sign in →</button>
        {err && <div className="hint" style={{ borderColor: 'var(--red)', background: 'rgba(200,16,46,0.1)' }}>{err}</div>}
        <div className="hint">Demo: click Sign-in with any credentials. This is a design mock.</div>
        <div className="meta">v1.0 · Need help? admin@blidworthwelfarefc.co.uk</div>
      </form>
    </div>
  );
}

function Dashboard({ user, onLogout }) {
  const [tab, setTab] = React.useState('dashboard');

  const articles = [
    { title: 'Welfare fall to Sunnyhill as relegation gap narrows', cat: 'Match Report', status: 'pub', date: '11 Apr' },
    { title: '100 Years: Centenary season programme unveiled', cat: 'Club', status: 'pub', date: '09 Apr' },
    { title: '‘Six games, six finals’ — manager\'s message', cat: 'First Team', status: 'pub', date: '07 Apr' },
    { title: 'Academy opens 2026 summer intake', cat: 'Community', status: 'pub', date: '05 Apr' },
    { title: 'Preview: Holbrook Sports (H)', cat: 'Match Preview', status: 'draft', date: '—' },
    { title: 'Centenary Dinner announcement', cat: 'Club', status: 'sched', date: '20 Apr' },
  ];

  const fixtures = [
    { when: 'Sat 18 Apr · 15:00', match: 'Blidworth Welfare vs Holbrook Sports', venue: 'Welfare Ground' },
    { when: 'Tue 21 Apr · 19:45', match: 'Blidworth Welfare vs Borrowash Victoria', venue: 'Welfare Ground' },
    { when: 'Sat 25 Apr · 15:00', match: 'Wirksworth Ivanhoe vs Blidworth Welfare', venue: 'Away' },
    { when: 'Tue 28 Apr · 19:45', match: 'Blidworth Welfare vs Linby Colliery W.', venue: 'Welfare Ground' },
  ];

  return (
    <div className="admin-shell">
      <aside className="admin-side">
        <div className="admin-side-head">
          <img src="assets/crest.png" alt=""/>
          <div>
            <h1>Welfare Admin</h1>
            <span>BWFC · v1.0</span>
          </div>
        </div>
        <nav className="admin-nav">
          {[
            ['dashboard', '◉', 'Dashboard'],
            ['articles', '✎', 'Articles & News'],
            ['fixtures', '⚽', 'Fixtures & Results'],
            ['table', '≡', 'League Table'],
            ['squad', '♙', 'Squad'],
            ['lotto', '◈', 'Welfare Lotto'],
            ['shop', '◫', 'Club Shop'],
            ['tickets', '▦', 'Tickets'],
            ['sponsors', '✦', 'Sponsors'],
            ['media', '▤', 'Media Library'],
            ['settings', '⚙', 'Settings'],
          ].map(([key, ico, label]) => (
            <a key={key} href="#" className={tab === key ? 'active' : ''}
               onClick={(e) => { e.preventDefault(); setTab(key); }}>
              <span className="dot">{ico}</span>{label}
            </a>
          ))}
        </nav>
        <div className="admin-user">
          <div className="avatar">{user[0].toUpperCase()}</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontWeight: 600 }}>{user}</div>
            <div style={{ opacity: 0.5 }}>Club Administrator</div>
          </div>
          <a href="#" onClick={(e) => { e.preventDefault(); onLogout(); }}
             style={{ color: 'var(--paper)', opacity: 0.5, fontSize: 10 }}>↗</a>
        </div>
      </aside>

      <main className="admin-main">
        <div className="admin-bar">
          <div>
            <div className="eyebrow">Saturday 18 April 2026</div>
            <h2>{tab === 'dashboard' ? 'Good morning, ' + user.split('.')[0] : tab[0].toUpperCase() + tab.slice(1)}</h2>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <button className="mini-btn">Preview Site ↗</button>
            <button className="mini-btn primary">Publish Changes</button>
          </div>
        </div>

        {tab === 'dashboard' && (
          <>
            <div className="admin-grid">
              <div className="stat-card">
                <div className="k">Site Visitors · 7d</div>
                <div className="v">1,284</div>
                <div className="delta up">▲ 12% vs last week</div>
              </div>
              <div className="stat-card">
                <div className="k">Lotto Entries · This week</div>
                <div className="v">87</div>
                <div className="delta up">▲ £87 raised</div>
              </div>
              <div className="stat-card">
                <div className="k">Tickets Sold · Sat</div>
                <div className="v">142</div>
                <div className="delta">of 200 allocation</div>
              </div>
              <div className="stat-card">
                <div className="k">Shop Orders · 7d</div>
                <div className="v">9</div>
                <div className="delta up">▲ 3 centenary shirts</div>
              </div>
            </div>

            <div className="admin-panels">
              <div>
                <div className="panel">
                  <div className="panel-head">
                    <h3>Recent Articles</h3>
                    <button className="mini-btn primary">+ New Article</button>
                  </div>
                  {articles.map((a, i) => (
                    <div className="row" key={i}>
                      <div>
                        <div className="title">{a.title}</div>
                        <div className="meta">{a.cat} · {a.date}</div>
                      </div>
                      <span className={`badge ${a.status}`}>{a.status === 'pub' ? 'Live' : a.status === 'draft' ? 'Draft' : 'Scheduled'}</span>
                      <div className="actions">
                        <button className="icon-btn" title="Edit">✎</button>
                        <button className="icon-btn" title="View">↗</button>
                      </div>
                    </div>
                  ))}
                </div>

                <div className="panel" style={{ marginTop: 16 }}>
                  <div className="panel-head">
                    <h3>Upcoming Fixtures</h3>
                    <button className="mini-btn">Sync from FA →</button>
                  </div>
                  {fixtures.map((f, i) => (
                    <div className="row" key={i}>
                      <div>
                        <div className="title">{f.match}</div>
                        <div className="meta">{f.when} · {f.venue}</div>
                      </div>
                      <span className="badge sched">Upcoming</span>
                      <div className="actions">
                        <button className="icon-btn" title="Edit">✎</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div>
                <div className="panel">
                  <div className="panel-head"><h3>Quick Actions</h3></div>
                  <div className="quick-actions">
                    <button><span className="ico">✎</span>Write match report</button>
                    <button><span className="ico">⚽</span>Sync FA fixtures</button>
                    <button><span className="ico">◈</span>Announce lotto winner</button>
                    <button><span className="ico">▦</span>Open ticket sale</button>
                    <button><span className="ico">♙</span>Update squad</button>
                    <button><span className="ico">✦</span>Add sponsor</button>
                  </div>
                </div>

                <div className="panel" style={{ marginTop: 16 }}>
                  <div className="panel-head"><h3>Activity</h3></div>
                  <div className="activity">
                    {[
                      ['Kate Denton', 'published ‘Welfare fall to Sunnyhill’', '2h ago'],
                      ['Mark (auto)', 'synced league table from FA Full-Time', '14h ago'],
                      ['Tom Hodgkinson', 'uploaded 8 photos to media library', 'Yesterday'],
                      ['Kate Denton', 'scheduled ‘Centenary Dinner’ for 20 Apr', 'Yesterday'],
                      ['Mark (auto)', 'closed lotto draw — winner: J. Morley', '2d ago'],
                    ].map((it, i) => (
                      <div className="activity-item" key={i}>
                        <div className="dot-2"/>
                        <div style={{ flex: 1 }}>
                          <div><strong>{it[0]}</strong> {it[1]}</div>
                          <div className="when">{it[2]}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="panel" style={{ marginTop: 16, background: 'var(--ink)', color: 'var(--paper)', borderColor: 'var(--ink)' }}>
                  <div className="panel-head" style={{ borderColor: 'var(--rule-light)' }}>
                    <h3 style={{ color: 'var(--gold)' }}>Welfare Lotto</h3>
                  </div>
                  <div style={{ padding: 24 }}>
                    <div style={{ opacity: 0.6, fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 8 }}>Rollover</div>
                    <div style={{ fontFamily: 'var(--font-display)', fontSize: 56, fontWeight: 700, fontVariantNumeric: 'tabular-nums', marginBottom: 16 }}>£1,240</div>
                    <div style={{ fontSize: 12, opacity: 0.7, marginBottom: 20 }}>Draw Friday 8pm · 87 entries this week</div>
                    <button className="mini-btn" style={{ background: 'var(--gold)', color: 'var(--ink)', borderColor: 'var(--gold)', width: '100%' }}>
                      Manage Draw →
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </>
        )}

        {tab !== 'dashboard' && (
          <div className="panel" style={{ padding: 48, textAlign: 'center' }}>
            <div className="eyebrow" style={{ opacity: 0.5, marginBottom: 12 }}>Design mock</div>
            <h3 className="h-display" style={{ fontSize: 28, fontWeight: 600, marginBottom: 12 }}>
              {tab[0].toUpperCase() + tab.slice(1)} section
            </h3>
            <p style={{ opacity: 0.6, maxWidth: 480, margin: '0 auto', fontSize: 14 }}>
              This is where you'd edit {tab}. In a real build each section gets a list view, an edit form, and a preview.
              We can wire any of these up to a CMS when you're ready to go live.
            </p>
            <button className="mini-btn primary" style={{ marginTop: 24 }}
              onClick={() => setTab('dashboard')}>← Back to dashboard</button>
          </div>
        )}
      </main>
    </div>
  );
}

function App() {
  const [user, setUser] = React.useState(null);
  if (!user) return <Login onLogin={setUser}/>;
  return <Dashboard user={user} onLogout={() => setUser(null)}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
