name: FA Full-Time League Table Sync

on:
  schedule:
    - cron: '0 6 * * 3'
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download FA Full-Time table
        run: |
          curl -sL \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
            -H "Accept-Language: en-GB,en;q=0.5" \
            "https://fulltime.thefa.com/table.html?league=1854955&selectedSeason=912243998&selectedDivision=201151991&selectedCompetition=0&selectedFixtureGroupKey=1_532713038" \
            -o /tmp/fa-table.html
          echo "Downloaded $(wc -c < /tmp/fa-table.html) bytes"

      - name: Run FA Full-Time sync
        run: node scripts/fa-sync.js /tmp/fa-table.html

      - name: Commit updated table
        run: |
          git config --global user.name 'BWFC FA Sync Bot'
          git config --global user.email 'noreply@blidworthwelfarefc.co.uk'
          git add components/data.jsx
          if git diff --staged --quiet; then
            echo "No changes - table unchanged"
          else
            git commit -m "Auto: FA league table sync $(date +'%Y-%m-%d')"
            git push
          fi

      - name: Deploy to Netlify
        run: |
          zip -r site.zip . -x ".git/*" -x "*.zip" -x "node_modules/*"
          curl -s -X POST "https://api.netlify.com/api/v1/sites/${{ secrets.NETLIFY_SITE_ID }}/deploys" -H "Authorization: Bearer ${{ secrets.NETLIFY_TOKEN }}" -H "Content-Type: application/zip" --data-binary @site.zip
