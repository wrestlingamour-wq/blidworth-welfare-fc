<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1440">
<title>Club · Blidworth Welfare FC</title>
<link rel="stylesheet" href="styles/base.css">
<style>
  .honour-row { display: flex; justify-content: space-between; align-items: baseline; padding: 20px 0; border-bottom: 1px solid var(--rule); }
  .honour-row:first-child { border-top: 1px solid var(--rule); }
  .board-card { background: var(--white); border: 1px solid var(--rule); padding: 32px; }
  .board-card:hover { border-color: var(--gold); transition: border-color 0.2s; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="components/data.jsx"></script>
<script type="text/babel" src="components/ui.jsx"></script>
<script type="text/babel">

const BOARD = [
  { name: 'Chairman', person: 'TBC', email: '' },
  { name: 'Secretary', person: 'TBC', email: '' },
  { name: 'Treasurer', person: 'TBC', email: '' },
  { name: 'Team Manager', person: 'Dan Mellors', email: '' },
  { name: 'Assistant Manager', person: 'TBC', email: '' },
  { name: 'Welfare Officer', person: 'TBC', email: '' },
];

function Page() {
  const d = BW_DATA;

  // Scroll to section if hash present on load
  React.useEffect(() => {
    if (location.hash) {
      const el = document.querySelector(location.hash);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }, []);

  return (<>
    <Ticker/>
    <SiteNav current="club"/>

    {/* HERO */}
    <section style={{ background: 'var(--ink)', color: 'var(--paper)', padding: '80px 0 72px' }}>
      <div className="wrap">
        <div className="eyebrow reveal reveal-1" style={{ color: 'var(--gold)', marginBottom: 16 }}>
          Blidworth Welfare FC · Est. {d.club.founded}
        </div>
        <h1 className="h-display reveal reveal-2" style={{ fontSize: 'clamp(64px, 8vw, 128px)', fontWeight: 700, lineHeight: 0.88, letterSpacing: '-0.03em' }}>
          The Club
        </h1>
        <p className="reveal reveal-3" style={{ fontSize: 18, opacity: 0.7, maxWidth: 560, marginTop: 24 }}>
          One hundred years of community football in {d.club.location}. From the Notts Spartan League to the Camper UK Alliance — and still going.
        </p>
        <div style={{ display: 'flex', gap: 24, marginTop: 40 }}>
          <a href="#history" style={{ color: 'var(--gold)', fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 13, letterSpacing: '0.1em', textTransform: 'uppercase' }}>
            History & Honours ↓
          </a>
          <a href="#board" style={{ color: 'rgba(255,255,255,0.5)', fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 13, letterSpacing: '0.1em', textTransform: 'uppercase' }}>
            Board & Contacts ↓
          </a>
        </div>
      </div>
    </section>

    {/* HISTORY & HONOURS */}
    <section id="history" style={{ padding: '96px 0', scrollMarginTop: 80 }}>
      <div className="wrap">
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 80 }}>

          {/* Club history text */}
          <div>
            <div className="eyebrow" style={{ color: 'var(--red)', marginBottom: 20 }}>Our Story</div>
            <h2 className="h-editorial" style={{ fontSize: 56, fontWeight: 400, marginBottom: 32, textWrap: 'balance' }}>
              A century at the Welfare Ground
            </h2>
            <div style={{ fontSize: 16, lineHeight: 1.8, color: 'var(--ink)', opacity: 0.85 }}>
              <p style={{ marginBottom: 20 }}>
                Blidworth Welfare Football Club was founded in 1926, rooted in the mining heritage of the village. The club has been a constant in the community through generations of change — surviving the pit closures, the lean years, and the gradual transformation of non-league football.
              </p>
              <p style={{ marginBottom: 20 }}>
                Playing in black and white on the Welfare Ground, the club has competed across several tiers of Nottinghamshire and Midlands non-league football. Promotion to the Camper UK Alliance Premier Division South stands as one of the proudest recent achievements.
              </p>
              <p>
                The 2026/27 season marks 100 years of Welfare football — a centenary celebrated with a heritage kit, a commemorative fixture, and a commitment to keeping the game alive for the next generation of Blidworth supporters.
              </p>
            </div>
          </div>

          {/* Photo placeholder */}
          <div>
            <div className="ph" style={{ height: 400, marginBottom: 24 }}>
              <span className="ph-label">[ photo: historical club photo / ground ]</span>
            </div>
            <div className="ph" style={{ height: 180 }}>
              <span className="ph-label">[ photo: centenary badge / archive ]</span>
            </div>
          </div>
        </div>

        {/* Honours */}
        <div style={{ marginTop: 80, paddingTop: 64, borderTop: '1px solid var(--rule)' }}>
          <div className="eyebrow" style={{ color: 'var(--gold)', marginBottom: 24 }}>Honours</div>
          <h2 className="h-editorial" style={{ fontSize: 48, fontWeight: 400, marginBottom: 48 }}>Roll of honour</h2>
          <div style={{ maxWidth: 720 }}>
            {d.honours.map((h, i) => (
              <div key={i} className="honour-row">
                <div style={{ fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 16 }}>{h.title}</div>
                <div className="eyebrow" style={{ opacity: 0.5, flexShrink: 0, marginLeft: 24 }}>{h.year}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Facts strip */}
        <div style={{ marginTop: 80, display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 0, borderTop: '2px solid var(--ink)', borderLeft: '1px solid var(--rule)' }}>
          {[
            { label: 'Founded', value: d.club.founded },
            { label: 'Ground', value: d.club.ground },
            { label: 'Division', value: d.club.division },
            { label: 'Colours', value: d.club.colours },
          ].map(f => (
            <div key={f.label} style={{ padding: '32px 28px', borderRight: '1px solid var(--rule)', borderBottom: '1px solid var(--rule)' }}>
              <div className="eyebrow" style={{ opacity: 0.5, marginBottom: 10 }}>{f.label}</div>
              <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 22 }}>{f.value}</div>
            </div>
          ))}
        </div>
      </div>
    </section>

    {/* BOARD & CONTACTS */}
    <section id="board" style={{ padding: '96px 0', background: 'var(--paper-2)', scrollMarginTop: 80 }}>
      <div className="wrap">
        <div className="eyebrow" style={{ color: 'var(--red)', marginBottom: 20 }}>Who we are</div>
        <h2 className="h-editorial" style={{ fontSize: 56, fontWeight: 400, marginBottom: 56 }}>Board & Contacts</h2>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 24, marginBottom: 64 }}>
          {BOARD.map((m, i) => (
            <div key={i} className="board-card">
              <div className="ph" style={{ height: 180, marginBottom: 24 }}>
                <span className="ph-label">[ photo ]</span>
              </div>
              <div className="eyebrow" style={{ color: 'var(--gold)', marginBottom: 8 }}>{m.name}</div>
              <div style={{ fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 20, marginBottom: 8 }}>
                {m.person}
              </div>
              {m.email && (
                <a href={`mailto:${m.email}`} style={{ color: 'var(--muted)', fontSize: 13 }}>{m.email}</a>
              )}
            </div>
          ))}
        </div>

        {/* General contact */}
        <div style={{ background: 'var(--ink)', color: 'var(--paper)', padding: '48px 56px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 48, alignItems: 'center' }}>
          <div>
            <div className="eyebrow" style={{ color: 'var(--gold)', marginBottom: 16 }}>Get in touch</div>
            <h3 className="h-editorial" style={{ fontSize: 40, fontWeight: 400, marginBottom: 20 }}>
              General enquiries
            </h3>
            <p style={{ opacity: 0.7, fontSize: 16, lineHeight: 1.7 }}>
              For all general club enquiries, sponsorship opportunities, or media requests, please reach out via our social channels or email the club secretary.
            </p>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
            {[
              { label: 'Ground Address', value: 'Welfare Ground, Blidworth, NG21' },
              { label: 'General Email', value: 'info@blidworthwelfarefc.co.uk' },
              { label: 'Social', value: '@BlidworthWFC' },
            ].map(c => (
              <div key={c.label} style={{ paddingBottom: 20, borderBottom: '1px solid rgba(255,255,255,0.1)' }}>
                <div className="eyebrow" style={{ opacity: 0.4, marginBottom: 4 }}>{c.label}</div>
                <div style={{ fontSize: 16, fontWeight: 500 }}>{c.value}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </section>

    <SponsorStrip sponsors={d.sponsors}/>
    <SiteFooter/>
  </>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<Page/>);
</script>
</body>
</html>
