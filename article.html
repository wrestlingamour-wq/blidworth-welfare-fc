<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1440">
<title>News · Blidworth Welfare FC</title>
<link rel="stylesheet" href="styles/base.css">
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="components/data.js"></script>
<script src="components/ui.js"></script>
<script type="text/babel">
const CAT_LABELS = {
  firstteam: 'First Team',
  announcements: 'Announcements',
  sponsorships: 'Sponsorships',
};

function Page() {
  const d = BW_DATA;
  const id = new URLSearchParams(location.search).get('id');
  const news = d.news || [];
  const article = id ? news.find(n => n.id === id) : news[0];
  const others = news.filter(n => !article || n.id !== article.id).slice(0, 3);

  if (!article) {
    return (<>
      <Ticker/>
      <SiteNav current="news"/>
      <section style={{ padding: '120px 0', textAlign: 'center' }}>
        <div className="wrap">
          <div className="eyebrow" style={{ color: 'var(--red)', marginBottom: 24 }}>Article not found</div>
          <h1 style={{ fontSize: 48, fontWeight: 400, marginBottom: 32 }}>This article doesn't exist.</h1>
          <a href="news.html" className="btn">← Back to News</a>
        </div>
      </section>
      <SiteFooter/>
    </>);
  }

  // Split body into paragraphs on blank lines or single newlines
  const paragraphs = (article.body || '').split(/\n\n+/).map(p => p.trim()).filter(Boolean);
  const singleLines = paragraphs.length === 1
    ? (article.body || '').split(/\n/).map(p => p.trim()).filter(Boolean)
    : paragraphs;
  const paras = paragraphs.length > 1 ? paragraphs : singleLines;

  const catLabel = article.catLabel || CAT_LABELS[article.cat] || article.cat || 'News';

  return (<>
    <Ticker/>
    <SiteNav current="news"/>
    <article>
      {/* Hero */}
      <section style={{ background: 'var(--ink)', color: 'var(--paper)', position: 'relative', overflow: 'hidden' }}>
        {article.photos && article.photos[0]
          ? <img src={article.photos[0]} style={{ position: 'absolute', inset: 0, width: '100%', height: 760, objectFit: 'cover', opacity: 0.45 }} />
          : <div className="ph" style={{ position: 'absolute', inset: 0, height: 760, opacity: 0.3 }}/>
        }
        <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(180deg, rgba(10,10,10,0.2), rgba(10,10,10,0.95))', height: 760 }}/>
        <div className="wrap" style={{ position: 'relative', padding: '120px 0 80px', minHeight: 760, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end' }}>
          <div style={{ display: 'flex', gap: 12, marginBottom: 24 }}>
            <span className="chip red">{catLabel}</span>
          </div>
          <h1 className="h-editorial" style={{ fontSize: 'clamp(48px, 7vw, 120px)', fontWeight: 400, textWrap: 'balance', marginBottom: 28, maxWidth: 1100, lineHeight: 0.95 }}>
            {article.title}
          </h1>
          {article.kicker && (
            <p className="h-editorial" style={{ fontSize: 22, fontStyle: 'italic', maxWidth: 860, marginBottom: 32, opacity: 0.88, textWrap: 'pretty' }}>
              {article.kicker}
            </p>
          )}
          <div style={{ display: 'flex', gap: 24, fontSize: 14, opacity: 0.7 }}>
            <span>By <em>{article.author || 'Club Media'}</em></span>
            <span>·</span>
            <span>{article.date}</span>
          </div>
        </div>
      </section>

      {/* Body */}
      <section style={{ padding: '80px 0', background: 'var(--paper)' }}>
        <div className="wrap" style={{ display: 'grid', gridTemplateColumns: '1fr 2.4fr 1fr', gap: 48 }}>
          {/* Share sidebar */}
          <aside style={{ position: 'sticky', top: 120, alignSelf: 'start' }}>
            <div className="eyebrow" style={{ marginBottom: 16, opacity: 0.5 }}>Share</div>
            {['X (Twitter)', 'Facebook', 'WhatsApp', 'Copy link'].map(s => (
              <a key={s} href="#" style={{ display: 'block', padding: '10px 0', fontSize: 13, borderBottom: '1px solid var(--rule)', color: 'var(--ink)' }}>{s} →</a>
            ))}
            <div style={{ marginTop: 32 }}>
              <a href="news.html" style={{ fontSize: 13, color: 'var(--muted)' }}>← All News</a>
            </div>
          </aside>

          {/* Article text */}
          <div style={{ fontSize: 18, lineHeight: 1.8, textWrap: 'pretty' }}>
            {paras.length === 0 && (
              <p style={{ opacity: 0.5, fontStyle: 'italic' }}>No article body yet.</p>
            )}
            {paras.map((para, i) => (
              <p key={i} style={{ marginBottom: 24 }}>
                {i === 0 && (
                  <span style={{ fontFamily: 'var(--font-editorial)', fontSize: 80, float: 'left', lineHeight: 0.85, marginRight: 12, marginTop: 8 }}>
                    {para[0]}
                  </span>
                )}
                {i === 0 ? para.slice(1) : para}
              </p>
            ))}

            {/* Extra photos */}
            {article.photos && article.photos.slice(1).map((src, i) => (
              <img key={i} src={src} style={{ width: '100%', marginBottom: 48, display: 'block' }} />
            ))}
          </div>

          {/* Right sidebar — more articles */}
          <aside>
            {others.length > 0 && (<>
              <div className="eyebrow" style={{ marginBottom: 16, color: 'var(--gold)' }}>More news</div>
              {others.map(n => (
                <a key={n.id} href={`article.html?id=${n.id}`} style={{ display: 'block', padding: '16px 0', borderBottom: '1px solid var(--rule)', color: 'var(--ink)', textDecoration: 'none', marginBottom: 4 }}>
                  <div className="eyebrow" style={{ fontSize: 10, opacity: 0.5, marginBottom: 6 }}>{n.catLabel || CAT_LABELS[n.cat] || n.cat}</div>
                  <div style={{ fontSize: 15, fontWeight: 600, lineHeight: 1.3, marginBottom: 4 }}>{n.title}</div>
                  <div style={{ fontSize: 12, opacity: 0.5 }}>{n.date}</div>
                </a>
              ))}
            </>)}
          </aside>
        </div>
      </section>

      {/* Related articles */}
      {others.length > 0 && (
        <section style={{ padding: '64px 0', background: 'var(--paper-2)' }}>
          <div className="wrap">
            <SectionHeader eyebrow="Keep reading" title="More from the newsroom" action={{ label: 'All News', href: 'news.html' }}/>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 32 }}>
              {others.map(n => <NewsCard key={n.id} item={n}/>)}
            </div>
          </div>
        </section>
      )}
    </article>
    <SponsorStrip sponsors={d.sponsors}/>
    <SiteFooter/>
  </>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<Page/>);
</script>
</body>
</html>
