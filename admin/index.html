<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1440">
<title>Admin · Blidworth Welfare FC</title>
<link rel="stylesheet" href="../styles/base.css">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #f4f4f2; }
  .admin-wrap { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }

  /* Sidebar */
  .sidebar { background: var(--ink); color: var(--paper); display: flex; flex-direction: column; }
  .sidebar-brand { padding: 24px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .sidebar-brand .crest { width: 36px; height: 36px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; margin-bottom: 8px; font-weight: 700; font-size: 14px; color: var(--ink); }
  .sidebar-brand .club { font-family: var(--font-display); font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; }
  .sidebar-brand .label { font-size: 10px; opacity: 0.4; letter-spacing: 0.15em; text-transform: uppercase; margin-top: 2px; }
  .sidebar-nav { flex: 1; padding: 16px 0; overflow-y: auto; }
  .nav-group { margin-bottom: 8px; }
  .nav-group-label { padding: 8px 20px 4px; font-size: 9px; opacity: 0.35; text-transform: uppercase; letter-spacing: 0.2em; font-family: var(--font-display); }
  .nav-btn { display: block; width: 100%; text-align: left; padding: 10px 20px; font-size: 13px; color: rgba(255,255,255,0.7); border: none; background: transparent; cursor: pointer; transition: all 0.15s; font-family: var(--font-body); }
  .nav-btn:hover { color: var(--paper); background: rgba(255,255,255,0.06); }
  .nav-btn.active { color: var(--gold); background: rgba(212,162,76,0.1); font-weight: 600; }
  .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); }
  .save-pill { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: var(--gold); opacity: 0; transition: opacity 0.3s; }
  .save-pill.visible { opacity: 1; }

  /* Main area */
  .main-content { padding: 40px 48px; overflow-y: auto; max-width: 1100px; }
  .section-title { font-family: var(--font-display); font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted); margin-bottom: 6px; }
  .section-h { font-size: 32px; font-weight: 700; color: var(--ink); margin-bottom: 32px; }

  /* Cards */
  .card { background: #fff; border: 1px solid var(--rule); padding: 28px; margin-bottom: 20px; }
  .card-title { font-family: var(--font-display); font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 16px; }

  /* Form elements */
  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--ink); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; font-family: var(--font-display); }
  .field input, .field select, .field textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--rule); background: #fff; font-size: 14px; font-family: var(--font-body); color: var(--ink); }
  .field textarea { resize: vertical; min-height: 100px; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--gold); }

  /* Buttons */
  .btn-primary { padding: 12px 24px; background: var(--ink); color: var(--paper); border: none; font-family: var(--font-display); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: background 0.2s; }
  .btn-primary:hover { background: #333; }
  .btn-gold { background: var(--gold); color: var(--ink); }
  .btn-gold:hover { background: #c49038; }
  .btn-red { background: var(--red); color: #fff; }
  .btn-red:hover { background: #c0392b; }
  .btn-sm { padding: 8px 16px; font-size: 11px; }
  .btn-ghost { background: transparent; border: 1px solid var(--rule); color: var(--ink); padding: 8px 16px; font-family: var(--font-display); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; }
  .btn-ghost:hover { border-color: var(--ink); }

  /* Tables */
  .admin-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .admin-table th { padding: 12px 14px; text-align: left; font-family: var(--font-display); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); border-bottom: 2px solid var(--ink); }
  .admin-table td { padding: 14px; border-bottom: 1px solid var(--rule); vertical-align: middle; }
  .admin-table tr:hover td { background: #fafaf8; }

  /* Tags/badges */
  .badge { display: inline-block; padding: 3px 10px; font-size: 11px; font-family: var(--font-display); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
  .badge-firstteam { background: #1a1a2e; color: #fff; }
  .badge-announcements { background: #2c6e49; color: #fff; }
  .badge-sponsorships { background: #7b4d12; color: #fff; }

  /* Article editor */
  .article-item { border: 1px solid var(--rule); padding: 16px 20px; margin-bottom: 12px; cursor: pointer; transition: border-color 0.15s; }
  .article-item:hover { border-color: var(--gold); }
  .article-item.selected { border-color: var(--gold); background: #fffdf5; }
  .article-item-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
  .article-item-meta { font-size: 12px; color: var(--muted); }

  /* Logo grid */
  .logo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .logo-item { border: 1px solid var(--rule); padding: 20px; text-align: center; }
  .logo-item img { width: 64px; height: 64px; object-fit: contain; display: block; margin: 0 auto 12px; }
  .logo-placeholder { width: 64px; height: 64px; background: var(--paper-2); border: 2px dashed var(--rule); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; color: var(--muted); font-size: 24px; }
  .logo-item-name { font-size: 12px; font-weight: 600; margin-bottom: 10px; color: var(--ink); }

  /* Tabs */
  .tab-bar { display: flex; gap: 0; border-bottom: 2px solid var(--rule); margin-bottom: 28px; }
  .tab-btn { padding: 12px 20px; font-family: var(--font-display); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; border: none; background: transparent; cursor: pointer; color: var(--muted); border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
  .tab-btn.active { color: var(--ink); border-bottom-color: var(--gold); }
  .tab-btn:hover:not(.active) { color: var(--ink); }

  /* Login screen */
  .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--ink); }
  .login-box { background: var(--paper); padding: 48px; width: 400px; }

  /* Publish section */
  .publish-bar { background: var(--ink); color: var(--paper); padding: 20px 28px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
  .publish-status { font-size: 13px; opacity: 0.7; }
  .publish-status.ok { color: var(--gold); opacity: 1; }
  .publish-status.error { color: #e74c3c; opacity: 1; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>document.write('<script src="../components/data.js?v='+Date.now()+'"><\/script>');</script>

<script src="admin-app.js"></script>
  </body>
</html>
