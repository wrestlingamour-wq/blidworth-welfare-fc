<head>

<script type="text/babel">
const CAT_LABELS = {
  all: 'All',
  firstteam: 'First Team',
  announcements: 'Announcements',
  sponsorships: 'Sponsorships',
};

function Page() {

    setFilter(c);
    const url = new URL(location.href);
    if (c === 'all') url.searchParams.delete('cat');
    else url.searchParams.set('cat', c);
    history.replaceState(null, '', url);
  };

    <SiteNav current="news"/>

        </h1>
      </div>
    </section>
    <section style={{ padding: '32px 0', borderBottom: '1px solid var(--rule)' }}>

          <button key={c} onClick={() => handleFilter(c)} style={{
            padding: '10px 18px', border: '1px solid var(--rule)',

            color: filter === c ? 'var(--paper)' : 'var(--ink)',
            fontFamily: 'var(--font-display)', textTransform: 'uppercase',
            letterSpacing: '0.1em', fontSize: 12, fontWeight: 500,
          }}>{CAT_LABELS[c]}</button>
        ))}
      </div>
    </section>
    <section style={{ padding: '64px 0 96px' }}>
      <div className="wrap">
        {filtered.length === 0 && (
          <div style={{ padding: '80px 0', textAlign: 'center', color: 'var(--muted)' }}>
            <div className="eyebrow">No articles yet in this section</div>
          </div>
        )}
        {filtered[0] && (
          <a href="article.html" style={{
            display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: 48,
            marginBottom: 64, color: 'var(--ink)',
          }} className="news-card">

              <h2 className="h-editorial" style={{ fontSize: 72, fontWeight: 400, textWrap: 'balance', marginBottom: 24 }}>
